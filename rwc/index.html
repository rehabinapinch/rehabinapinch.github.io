<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return2Run Program Creator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #059669;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2, h3 {
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .input-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 25px;
        }

        .day-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-success { background-color: var(--success); color: white; }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 12px;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        #formalRecommendations {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
        }

        .hidden { display: none !important; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            #programTable { display: table !important; }
            #formalRecommendations { 
                display: block !important; 
                background: white !important; 
                border: 1px solid #ccc !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2 id="setupTitle">Custom Run/Walk Program</h2>
    </div>

    <div id="editorSection" class="no-print">
        <div id="customOptions">
            <div class="input-grid"></div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="generateProgram()">Update Table</button>
            <button class="btn-outline" onclick="resetProgram()">Reset All</button>
        </div>
    </div>

    <table id="programTable">
        <thead>
            <tr>
                <th>Day</th>
                <th>Run/Walk Ratio</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="recommendationsSection" class="no-print">
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border);">
        <h2>Clinical Recommendations</h2>
        <textarea id="recommendations">This program assists with load management to return to your running baseline.

Recommendations:
• Walk/Run Program: 
• Increasing cadence: 
• Surfaces: 
• Exercises: Daily 8-10 reps x 3 sets
• Pain Threshold (0/10): 
• Additional Notes:</textarea>
        <button class="btn-primary" onclick="generateFormal()">Finalize Recommendations</button>
    </div>

    <div id="formalRecommendations"></div>
    
    <div id="finalActions" class="button-group hidden no-print" style="margin-top: 20px;">
        <button class="btn-success" onclick="window.print()">Print This Plan</button>
        <button class="btn-outline" onclick="backToEditor()">Edit Details</button>
        <button class="btn-outline" onclick="resetProgram()">Reset All</button>
    </div>
</div>

<script>
    const daysCount = 5;
    const inputContainer = document.querySelector('.input-grid');

    function initInputs() {
        inputContainer.innerHTML = '';
        for (let i = 1; i <= daysCount; i++) {
            inputContainer.innerHTML += `
                <div class="day-row">
                    <span>Day ${i}</span>
                    <input type="number" id="day${i}Reps" value="3" min="1" placeholder="Reps">
                    <input type="text" id="day${i}Ratio" value="1:1" placeholder="Ratio (e.g. 2:1)">
                </div>`;
        }
    }

    function generateProgram() {
        const table = document.getElementById("programTable");
        const tbody = table.querySelector('tbody');
        tbody.innerHTML = ""; 

        for (let i = 1; i <= daysCount; i++) {
            const reps = parseInt(document.getElementById(`day${i}Reps`).value) || 0;
            const ratioStr = document.getElementById(`day${i}Ratio`).value;
            const parts = ratioStr.split(":").map(Number);
            
            const run = parts[0] || 0;
            const walk = parts[1] || 0;
            const total = (run + walk) * reps;

            const row = tbody.insertRow();
            row.innerHTML = `
                <td><strong>Day ${i}</strong></td>
                <td>${run}m run / ${walk}m walk</td>
                <td>${reps} reps — <small>Total: ${total} mins</small></td>
            `;
        }
        table.style.display = "table";
    }

    function generateFormal() {
        generateProgram(); // Sync table

        const text = document.getElementById('recommendations').value;
        const formalDiv = document.getElementById('formalRecommendations');
        
        formalDiv.innerHTML = `<h3>Plan Summary & Clinical Notes</h3>` + text.replace(/\n/g, "<br>");
        formalDiv.style.display = 'block';
        
        // Toggle Visibility
        document.getElementById('editorSection').classList.add('hidden');
        document.getElementById('recommendationsSection').classList.add('hidden');
        document.getElementById('setupTitle').classList.add('hidden');
        document.getElementById('finalActions').classList.remove('hidden');
    }

    function backToEditor() {
        document.getElementById('editorSection').classList.remove('hidden');
        document.getElementById('recommendationsSection').classList.remove('hidden');
        document.getElementById('setupTitle').classList.remove('hidden');
        document.getElementById('finalActions').classList.add('hidden');
        document.getElementById('formalRecommendations').style.display = 'none';
    }

    function resetProgram() {
        if(confirm("Are you sure you want to reset all data?")) {
            initInputs();
            const table = document.getElementById("programTable");
            table.querySelector('tbody').innerHTML = "";
            table.style.display = "none";
            
            backToEditor();
            
            document.getElementById('recommendations').value = `This program assists with load management to return to your running baseline.\n\nRecommendations:\n• Walk/Run Program: \n• Increasing cadence: \n• Surfaces: \n• Exercises: Daily 8-10 reps x 3 sets\n• Pain Threshold (0/10): \n• Additional Notes:`;
        }
    }

    initInputs();
</script>

</body>
</html>
